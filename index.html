<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CodePals - Learn to Code!</title>
<style>
/* ===== RESET & BASE ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', 'Arial Rounded MT Bold', 'Nunito', sans-serif;
  background: #1a1a2e;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ===== SCREENS ===== */
.screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* ===== TITLE SCREEN ===== */
#title-screen {
  flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  gap: 20px;
}
#title-screen h1 {
  font-size: 64px; color: #fff; text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  animation: bounce 2s ease infinite;
}
#title-screen .subtitle { font-size: 24px; color: rgba(255,255,255,0.9); }
#title-screen .robot-big { font-size: 120px; animation: float 3s ease-in-out infinite; }
.lang-picker {
  display: flex; gap: 16px; margin-top: 10px;
}
.lang-btn {
  font-size: 48px; background: rgba(255,255,255,0.15); border: 4px solid transparent;
  border-radius: 16px; padding: 10px 18px; cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
}
.lang-btn:active { transform: scale(0.93); }
.lang-btn.selected { border-color: #fff; background: rgba(255,255,255,0.3); }
.lang-label { font-size: 14px; color: rgba(255,255,255,0.9); margin-top: 4px; }
.play-btn {
  margin-top: 20px; padding: 20px 60px; font-size: 32px; font-weight: bold;
  color: #fff; background: #ff6b6b; border: none; border-radius: 50px;
  cursor: pointer; box-shadow: 0 6px 0 #c0392b;
  transition: transform 0.1s; font-family: inherit;
}
.play-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c0392b; }

/* ===== LEVEL SELECT ===== */
#level-screen {
  flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
  gap: 15px;
}
#level-screen h2 { font-size: 40px; color: #2d3436; }
.level-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 15px; padding: 20px; max-width: 500px;
}
.level-btn {
  width: 100px; height: 100px; border-radius: 20px; border: none;
  font-size: 36px; font-weight: bold; color: #fff; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: transform 0.1s;
  font-family: inherit; position: relative;
}
.level-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
.level-btn.unlocked { background: #00b894; }
.level-btn.locked { background: #b2bec3; cursor: not-allowed; }
.level-btn.completed { background: #fdcb6e; }
.level-btn .stars { font-size: 14px; margin-top: 2px; }
.level-btn .lock-icon { font-size: 28px; }
.back-btn {
  padding: 12px 30px; font-size: 20px; font-weight: bold; color: #fff;
  background: #6c5ce7; border: none; border-radius: 30px; cursor: pointer;
  box-shadow: 0 4px 0 #4834d4; font-family: inherit;
}
.back-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4834d4; }

/* ===== GAME SCREEN ===== */
#game-screen {
  flex-direction: column; background: #f8f9fa;
}

/* Top Bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: #6c5ce7; color: #fff;
  min-height: 50px; flex-shrink: 0;
}
.top-bar .level-info { font-size: 20px; font-weight: bold; }
.top-bar .hint-text { font-size: 16px; max-width: 50%; text-align: center; }
.top-bar button {
  padding: 8px 16px; font-size: 16px; font-weight: bold; color: #6c5ce7;
  background: #fff; border: none; border-radius: 20px; cursor: pointer;
  font-family: inherit;
}

/* Main game area */
.game-area {
  display: flex; flex: 1; overflow: hidden;
}

/* Grid / Maze */
.grid-panel {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 10px; background: #dfe6e9;
}
.grid-container {
  display: grid; gap: 2px; background: #b2bec3; padding: 2px; border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.grid-cell {
  width: 60px; height: 60px; background: #fff; display: flex;
  align-items: center; justify-content: center; font-size: 32px;
  border-radius: 6px; position: relative;
}
.grid-cell.wall { background: #636e72; }
.grid-cell.path { background: #fff; }
.grid-cell.goal { background: #ffeaa7; }
.grid-cell.visited { background: #dfe6e9; }

/* Player character */
.player {
  font-size: 36px; transition: all 0.3s ease;
  position: absolute; z-index: 10;
}
.player.moving { animation: hop 0.3s ease; }

/* Coding Panel */
.code-panel {
  width: 320px; display: flex; flex-direction: column;
  background: #fff; border-left: 3px solid #dfe6e9; flex-shrink: 0;
}

/* Command palette */
.command-palette {
  padding: 10px; display: flex; flex-wrap: wrap; gap: 8px;
  border-bottom: 2px solid #eee; min-height: 60px; align-items: center;
}
.command-palette .section-label {
  width: 100%; font-size: 13px; color: #888; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px;
}

/* Command blocks */
.cmd-block {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; border-radius: 12px; font-size: 16px;
  font-weight: bold; cursor: grab; color: #fff;
  box-shadow: 0 3px 0 rgba(0,0,0,0.15);
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-user-select: none; user-select: none;
}
.cmd-block:active { transform: scale(0.95); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
.cmd-block.move { background: #0984e3; }
.cmd-block.turn-left { background: #e17055; }
.cmd-block.turn-right { background: #fdcb6e; color: #2d3436; }
.cmd-block.loop-start { background: #6c5ce7; border-radius: 12px 12px 4px 4px; }
.cmd-block.loop-end { background: #6c5ce7; border-radius: 4px 4px 12px 12px; font-size: 14px; }
.cmd-block .loop-count {
  background: rgba(255,255,255,0.3); border-radius: 8px;
  padding: 2px 10px; font-size: 18px; min-width: 30px; text-align: center;
}
.cmd-block .loop-adj {
  background: rgba(255,255,255,0.25); border: none; color: #fff;
  font-size: 18px; font-weight: bold; width: 28px; height: 28px;
  border-radius: 50%; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-family: inherit;
}

/* Program area */
.program-area {
  flex: 1; overflow-y: auto; padding: 10px; min-height: 100px;
  -webkit-overflow-scrolling: touch;
}
.program-area .section-label {
  font-size: 13px; color: #888; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.program-list {
  min-height: 80px; display: flex; flex-direction: column; gap: 6px;
  padding: 10px; border: 3px dashed #dfe6e9; border-radius: 12px;
  background: #f8f9fa; position: relative;
}
.program-list.drag-over { border-color: #0984e3; background: #e8f4fd; }
.program-list .placeholder {
  color: #b2bec3; font-size: 16px; text-align: center; padding: 20px;
  pointer-events: none;
}
.program-list .cmd-block { cursor: pointer; position: relative; }
.program-list .cmd-block .remove-btn {
  position: absolute; top: -6px; right: -6px; width: 22px; height: 22px;
  background: #e74c3c; color: #fff; border: 2px solid #fff;
  border-radius: 50%; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; font-weight: bold; line-height: 1;
}
.program-list .cmd-block.in-loop {
  margin-left: 20px; border-left: 3px solid #6c5ce7; padding-left: 10px;
}

/* Run controls */
.run-controls {
  display: flex; gap: 8px; padding: 10px; border-top: 2px solid #eee;
}
.run-btn {
  flex: 1; padding: 14px; font-size: 20px; font-weight: bold;
  color: #fff; background: #00b894; border: none; border-radius: 14px;
  cursor: pointer; box-shadow: 0 4px 0 #00a381;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit;
}
.run-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #00a381; }
.run-btn.reset { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; flex: 0.5; }
.run-btn.reset:active { box-shadow: 0 1px 0 #c0392b; }
.run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== WIN OVERLAY ===== */
#win-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); z-index: 1000;
  display: none; align-items: center; justify-content: center;
}
#win-overlay.active { display: flex; }
.win-card {
  background: #fff; border-radius: 30px; padding: 40px;
  text-align: center; animation: popIn 0.5s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 400px;
}
.win-card .trophy { font-size: 80px; animation: bounce 1s ease infinite; }
.win-card h2 { font-size: 36px; color: #2d3436; margin: 10px 0; }
.win-card .stars-display { font-size: 48px; margin: 10px 0; }
.win-card .msg { font-size: 18px; color: #636e72; margin-bottom: 20px; }
.win-card .win-btns { display: flex; gap: 10px; justify-content: center; }
.win-card .win-btns button {
  padding: 14px 28px; font-size: 18px; font-weight: bold; color: #fff;
  border: none; border-radius: 16px; cursor: pointer; font-family: inherit;
}
.win-card .win-btns .next-btn { background: #00b894; }
.win-card .win-btns .retry-btn { background: #fdcb6e; color: #2d3436; }
.win-card .win-btns .menu-btn { background: #6c5ce7; }

/* ===== INTRO OVERLAY ===== */
#intro-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 999;
  display: none; align-items: center; justify-content: center;
}
#intro-overlay.active { display: flex; }
.intro-card {
  background: #fff; border-radius: 30px; padding: 30px 40px;
  text-align: center; animation: popIn 0.4s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 450px;
}
.intro-card .intro-char { font-size: 80px; margin-bottom: 10px; }
.intro-card h2 { font-size: 28px; color: #2d3436; margin-bottom: 8px; }
.intro-card p { font-size: 18px; color: #636e72; margin-bottom: 6px; line-height: 1.5; }
.intro-card .new-concept {
  background: #ffeaa7; padding: 12px 18px; border-radius: 14px;
  font-size: 16px; color: #2d3436; margin: 12px 0; font-weight: bold;
}
.intro-card button {
  margin-top: 16px; padding: 14px 40px; font-size: 22px; font-weight: bold;
  color: #fff; background: #00b894; border: none; border-radius: 16px;
  cursor: pointer; font-family: inherit;
}

/* ===== CONFETTI ===== */
.confetti-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1001; overflow: hidden;
}
.confetti-piece {
  position: absolute; width: 12px; height: 12px; top: -20px;
  animation: confettiFall 3s ease-in forwards;
}

/* ===== ANIMATIONS ===== */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}
@keyframes hop {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes highlight {
  0%, 100% { box-shadow: 0 3px 0 rgba(0,0,0,0.15); }
  50% { box-shadow: 0 3px 0 rgba(0,0,0,0.15), 0 0 15px 5px rgba(255,255,0,0.5); }
}
.cmd-block.executing {
  animation: highlight 0.5s ease;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .game-area { flex-direction: column; }
  .code-panel { width: 100%; border-left: none; border-top: 3px solid #dfe6e9; flex: 1; }
  .grid-panel { flex: 0 0 auto; min-height: 280px; }
  .grid-cell { width: 48px; height: 48px; font-size: 26px; }
  .player { font-size: 28px; }
  .command-palette { min-height: 50px; }
  .program-area { min-height: 60px; }
}
@media (max-width: 600px) {
  .grid-cell { width: 40px; height: 40px; font-size: 22px; }
  .player { font-size: 24px; }
  #title-screen h1 { font-size: 42px; }
  #title-screen .robot-big { font-size: 80px; }
  .play-btn { padding: 16px 40px; font-size: 24px; }
  .cmd-block { padding: 8px 10px; font-size: 14px; }
  .code-panel { width: 100%; }
}
</style>
</head>
<body>

<!-- ===== TITLE SCREEN ===== -->
<div id="title-screen" class="screen active">
  <div class="robot-big">🤖</div>
  <h1>CodePals</h1>
  <div class="subtitle" id="title-subtitle">Learn to code with Robo!</div>
  <div class="lang-picker">
    <button class="lang-btn selected" onclick="setLanguage('en')" id="lang-en" title="English">🇬🇧<div class="lang-label">English</div></button>
    <button class="lang-btn" onclick="setLanguage('sv')" id="lang-sv" title="Svenska">🇸🇪<div class="lang-label">Svenska</div></button>
  </div>
  <button class="play-btn" id="play-btn" onclick="showScreen('level-screen')">Play!</button>
</div>

<!-- ===== LEVEL SELECT ===== -->
<div id="level-screen" class="screen">
  <h2 id="level-screen-title">Choose a Level</h2>
  <div class="level-grid" id="level-grid"></div>
  <button class="back-btn" id="back-btn" onclick="showScreen('title-screen')">Back</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen">
  <div class="top-bar">
    <button id="menu-btn" onclick="showScreen('level-screen')">Menu</button>
    <span class="level-info" id="level-label">Level 1</span>
    <span class="hint-text" id="hint-text"></span>
    <button onclick="showIntro()">?</button>
  </div>
  <div class="game-area">
    <div class="grid-panel">
      <div class="grid-container" id="grid"></div>
    </div>
    <div class="code-panel">
      <div class="command-palette" id="command-palette"></div>
      <div class="program-area">
        <div class="section-label">Your Program</div>
        <div class="program-list" id="program-list">
          <div class="placeholder">Drag blocks here!</div>
        </div>
      </div>
      <div class="run-controls">
        <button class="run-btn reset" id="reset-btn" onclick="resetLevel()">Clear</button>
        <button class="run-btn" id="run-btn" onclick="runProgram()">Run ▶</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== INTRO OVERLAY ===== -->
<div id="intro-overlay">
  <div class="intro-card" id="intro-card"></div>
</div>

<!-- ===== WIN OVERLAY ===== -->
<div id="win-overlay">
  <div class="win-card" id="win-card"></div>
</div>

<!-- ===== CONFETTI CONTAINER ===== -->
<div class="confetti-container" id="confetti-container"></div>

<script>
// =====================================================
// CODEPALS - A coding game for kids
// =====================================================

// ---- TRANSLATIONS ----
const TRANSLATIONS = {
  en: {
    subtitle: "Learn to code with Robo!",
    play: "Play!",
    chooseLvl: "Choose a Level",
    back: "Back",
    menu: "Menu",
    level: "Level",
    blocks: "Blocks",
    move: "Move",
    turnLeft: "Turn Left",
    turnRight: "Turn Right",
    loop: "Loop",
    endLoop: "End Loop",
    yourProgram: "Your Program",
    dragHere: "Drag blocks here!",
    clear: "Clear",
    run: "Run ▶",
    letsGo: "Let's Go!",
    levelComplete: "Level Complete!",
    goodTry: "Good try!",
    niceJob: "Nice job!",
    perfect: "Amazing! Perfect score!",
    retry: "Retry",
    nextLevel: "Next Level",
    hitEdge: "Oops! Robo went off the edge! 😵",
    hitWall: "Bonk! Robo hit a wall! 🧱",
    notReached: "Robo didn't reach the star! Try adding more commands. 🤔",
    levelNames: [
      "First Steps", "Keep Going", "Turn Around", "Left and Right",
      "Watch Out!", "Loop de Loop", "L-Shape", "Zigzag", "The Big Maze"
    ],
    intros: [
      { title: "Meet Robo! 🤖", text: "Robo wants to reach the star! Help Robo by giving commands.", concept: "Drag the 'Move' block into your program, then press Run!" },
      { title: "More Steps!", text: "Robo needs to walk further this time.", concept: "Use TWO 'Move' blocks to go two steps!" },
      { title: "Turning! 🔄", text: "Sometimes Robo needs to turn! Robo is facing down.", concept: "NEW: Use 'Turn Right' to change direction!" },
      { title: "Left Turn!", text: "Now Robo can also turn left!", concept: "NEW: 'Turn Left' turns Robo the other way!" },
      { title: "Walls! 🧱", text: "Oh no, there are walls! Robo can't walk through them.", concept: "Go AROUND the wall to reach the star!" },
      { title: "Loops! 🔁", text: "Robo has to walk a LOT of steps. That's tiring to program!", concept: "NEW: Use a LOOP to repeat commands! Put 'Move' inside the loop and set the number." },
      { title: "L-Shape Path", text: "Robo needs to go down, then turn and go sideways!", concept: "Combine moves and turns. Can you use a loop?" },
      { title: "Zigzag Maze! 🌀", text: "This maze is tricky! Plan your path carefully.", concept: "Think step by step. Which way should Robo go at each turn?" },
      { title: "The Big Maze! 🏆", text: "This is the ultimate challenge! Can you guide Robo through?", concept: "Use everything you've learned: moves, turns, and loops!" },
    ],
  },
  sv: {
    subtitle: "Lär dig programmera med Robo!",
    play: "Spela!",
    chooseLvl: "Välj en bana",
    back: "Tillbaka",
    menu: "Meny",
    level: "Bana",
    blocks: "Block",
    move: "Gå",
    turnLeft: "Sväng vänster",
    turnRight: "Sväng höger",
    loop: "Slinga",
    endLoop: "Slut slinga",
    yourProgram: "Ditt program",
    dragHere: "Dra block hit!",
    clear: "Rensa",
    run: "Kör ▶",
    letsGo: "Nu kör vi!",
    levelComplete: "Bana klar!",
    goodTry: "Bra försök!",
    niceJob: "Snyggt jobbat!",
    perfect: "Fantastiskt! Perfekt poäng!",
    retry: "Försök igen",
    nextLevel: "Nästa bana",
    hitEdge: "Hoppsan! Robo ramlade av kanten! 😵",
    hitWall: "Bonk! Robo körde in i en vägg! 🧱",
    notReached: "Robo nådde inte stjärnan! Testa att lägga till fler kommandon. 🤔",
    levelNames: [
      "Första stegen", "Fortsätt gå", "Vänd dig", "Vänster och höger",
      "Se upp!", "Slinga-lansen", "L-form", "Sicksack", "Den stora labyrinten"
    ],
    intros: [
      { title: "Möt Robo! 🤖", text: "Robo vill nå stjärnan! Hjälp Robo genom att ge kommandon.", concept: "Dra 'Gå'-blocket till ditt program och tryck Kör!" },
      { title: "Fler steg!", text: "Robo behöver gå längre den här gången.", concept: "Använd TVÅ 'Gå'-block för att gå två steg!" },
      { title: "Svängar! 🔄", text: "Ibland måste Robo svänga! Robo tittar nedåt.", concept: "NYTT: Använd 'Sväng höger' för att byta riktning!" },
      { title: "Vänstersväng!", text: "Nu kan Robo också svänga vänster!", concept: "NYTT: 'Sväng vänster' svänger Robo åt andra hållet!" },
      { title: "Väggar! 🧱", text: "Ojdå, det finns väggar! Robo kan inte gå genom dem.", concept: "Gå RUNT väggen för att nå stjärnan!" },
      { title: "Slingor! 🔁", text: "Robo behöver gå MÅNGA steg. Det är jobbigt att programmera!", concept: "NYTT: Använd en SLINGA för att upprepa kommandon! Lägg 'Gå' inuti slingan och ställ in antalet." },
      { title: "L-formad väg", text: "Robo behöver gå ner, sedan svänga och gå åt sidan!", concept: "Kombinera steg och svängar. Kan du använda en slinga?" },
      { title: "Sicksack-labyrint! 🌀", text: "Den här labyrinten är knepig! Planera din väg noga.", concept: "Tänk steg för steg. Åt vilket håll ska Robo gå vid varje sväng?" },
      { title: "Den stora labyrinten! 🏆", text: "Det här är den ultimata utmaningen! Kan du guida Robo igenom?", concept: "Använd allt du har lärt dig: steg, svängar och slingor!" },
    ],
  },
};

let currentLang = 'en';
function T(key) { return TRANSLATIONS[currentLang][key] || TRANSLATIONS.en[key] || key; }

function setLanguage(lang) {
  currentLang = lang;
  try { localStorage.setItem('codepals_lang', lang); } catch(e) {}
  // Update picker visuals
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('lang-' + lang).classList.add('selected');
  // Update title screen text
  document.getElementById('title-subtitle').textContent = T('subtitle');
  document.getElementById('play-btn').textContent = T('play');
}

// ---- GAME STATE ----
const state = {
  currentLevel: 0,
  program: [],          // [{type, ...}]
  playerPos: {r: 0, c: 0},
  playerDir: 0,         // 0=up,1=right,2=down,3=left
  isRunning: false,
  levelProgress: [],    // 0=locked, 1=unlocked, 2=completed
  starsEarned: [],      // stars per level (0-3)
};

// Direction vectors: up, right, down, left
const DIR_DR = [-1, 0, 1, 0];
const DIR_DC = [0, 1, 0, -1];
const DIR_EMOJI = ['⬆️', '➡️', '⬇️', '⬅️'];
const DIR_ROTATE = [0, 90, 180, 270];

// ---- AUDIO (Web Audio API for simple sounds) ----
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}
function playTone(freq, duration, type='sine', vol=0.15) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = vol;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function sfxMove() { playTone(440, 0.1, 'sine', 0.1); }
function sfxTurn() { playTone(330, 0.08, 'triangle', 0.1); }
function sfxCollect() { playTone(660, 0.15, 'sine', 0.12); playTone(880, 0.15, 'sine', 0.12); }
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playTone(f, 0.25, 'sine', 0.15), i * 150);
  });
}
function sfxFail() { playTone(200, 0.3, 'sawtooth', 0.08); }
function sfxPlace() { playTone(500, 0.06, 'sine', 0.08); }

// ---- INITIALIZATION ----
function init() {
  state.levelProgress = LEVELS.map((_, i) => i === 0 ? 1 : 0);
  state.starsEarned = LEVELS.map(() => 0);
  // Load saved progress
  try {
    const saved = JSON.parse(localStorage.getItem('codepals_progress'));
    if (saved) {
      state.levelProgress = saved.progress || state.levelProgress;
      state.starsEarned = saved.stars || state.starsEarned;
    }
  } catch(e) {}
  // Load saved language
  try {
    const savedLang = localStorage.getItem('codepals_lang');
    if (savedLang && TRANSLATIONS[savedLang]) setLanguage(savedLang);
  } catch(e) {}
  renderLevelGrid();
}

function saveProgress() {
  try {
    localStorage.setItem('codepals_progress', JSON.stringify({
      progress: state.levelProgress,
      stars: state.starsEarned,
    }));
  } catch(e) {}
}

// ---- SCREEN MANAGEMENT ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'level-screen') {
    document.getElementById('level-screen-title').textContent = T('chooseLvl');
    document.getElementById('back-btn').textContent = T('back');
    renderLevelGrid();
  }
}

// ---- LEVEL SELECT ----
function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lvl, i) => {
    const btn = document.createElement('button');
    const status = state.levelProgress[i];
    btn.className = 'level-btn ' + (status === 0 ? 'locked' : status >= 1 ? (state.starsEarned[i] > 0 ? 'completed' : 'unlocked') : 'locked');
    if (status === 0) {
      btn.innerHTML = `<span class="lock-icon">🔒</span>`;
    } else {
      const starStr = '⭐'.repeat(state.starsEarned[i]) + '☆'.repeat(3 - state.starsEarned[i]);
      btn.innerHTML = `${i + 1}<span class="stars">${starStr}</span>`;
      btn.onclick = () => startLevel(i);
    }
    grid.appendChild(btn);
  });
}

// ---- START LEVEL ----
function startLevel(levelIdx) {
  state.currentLevel = levelIdx;
  state.program = [];
  state.isRunning = false;
  showScreen('game-screen');
  renderGame();
  showIntro();
}

// ---- RENDER GAME ----
function renderGame() {
  const levelName = T('levelNames')[state.currentLevel];
  document.getElementById('level-label').textContent = `${T('level')} ${state.currentLevel + 1}: ${levelName}`;
  document.getElementById('hint-text').textContent = '';
  document.getElementById('menu-btn').textContent = T('menu');
  renderGrid();
  renderCommandPalette();
  renderProgram();
  document.getElementById('run-btn').textContent = T('run');
  document.getElementById('reset-btn').textContent = T('clear');
  document.getElementById('run-btn').disabled = false;
  document.getElementById('reset-btn').disabled = false;
}

// ---- RENDER GRID ----
function renderGrid() {
  const level = LEVELS[state.currentLevel];
  const g = level.grid;
  const rows = g.length;
  const cols = g[0].length;
  const container = document.getElementById('grid');
  container.style.gridTemplateColumns = `repeat(${cols}, auto)`;
  container.innerHTML = '';

  let startR = 0, startC = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      const ch = g[r][c];
      if (ch === '#') {
        cell.classList.add('wall');
        cell.textContent = '🧱';
      } else if (ch === 'G') {
        cell.classList.add('goal');
        cell.textContent = '⭐';
      } else if (ch === 'S') {
        startR = r; startC = c;
      }
      container.appendChild(cell);
    }
  }

  state.playerPos = {r: startR, c: startC};
  state.playerDir = level.startDir;

  // Add player element
  const player = document.createElement('div');
  player.className = 'player';
  player.id = 'player';
  player.textContent = '🤖';
  player.style.transform = `rotate(${DIR_ROTATE[state.playerDir]}deg)`;
  const startCell = container.querySelector(`[data-r="${startR}"][data-c="${startC}"]`);
  if (startCell) startCell.appendChild(player);
}

function movePlayerToCell(r, c) {
  const container = document.getElementById('grid');
  const cell = container.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  const player = document.getElementById('player');
  if (cell && player) {
    cell.appendChild(player);
    player.classList.add('moving');
    setTimeout(() => player.classList.remove('moving'), 300);
  }
}

function rotatePlayer(dir) {
  const player = document.getElementById('player');
  if (player) {
    player.style.transform = `rotate(${DIR_ROTATE[dir]}deg)`;
  }
}

function markCellVisited(r, c) {
  const container = document.getElementById('grid');
  const cell = container.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if (cell && !cell.classList.contains('goal') && !cell.classList.contains('wall')) {
    cell.classList.add('visited');
  }
}

// ---- RENDER COMMAND PALETTE ----
function cmdLabel(type) {
  if (type === 'move') return '➡️ ' + T('move');
  if (type === 'turn-left') return '↩️ ' + T('turnLeft');
  if (type === 'turn-right') return '↪️ ' + T('turnRight');
  if (type === 'loop-start') return '🔁 ' + T('loop');
  if (type === 'loop-end') return T('endLoop');
  return type;
}

function renderCommandPalette() {
  const level = LEVELS[state.currentLevel];
  const palette = document.getElementById('command-palette');
  palette.innerHTML = `<div class="section-label">${T('blocks')}</div>`;

  level.commands.forEach(cmd => {
    if (cmd === 'move') {
      palette.appendChild(createBlockElement('move', cmdLabel('move')));
    } else if (cmd === 'turn-left') {
      palette.appendChild(createBlockElement('turn-left', cmdLabel('turn-left')));
    } else if (cmd === 'turn-right') {
      palette.appendChild(createBlockElement('turn-right', cmdLabel('turn-right')));
    } else if (cmd === 'loop') {
      palette.appendChild(createBlockElement('loop-start', cmdLabel('loop-start')));
    }
  });
}

function createBlockElement(type, label) {
  const block = document.createElement('div');
  block.className = `cmd-block ${type}`;
  block.textContent = label;
  block.dataset.cmdType = type;

  // Touch & mouse drag
  block.addEventListener('mousedown', (e) => startDrag(e, type));
  block.addEventListener('touchstart', (e) => startDrag(e, type), {passive: false});

  return block;
}

// ---- DRAG & DROP ----
let dragData = null;
let dragGhost = null;

function startDrag(e, cmdType) {
  if (state.isRunning) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;

  dragData = { type: cmdType, fromProgram: false, index: -1 };

  // Create ghost
  dragGhost = document.createElement('div');
  dragGhost.className = `cmd-block ${cmdType}`;
  dragGhost.style.position = 'fixed';
  dragGhost.style.zIndex = '9999';
  dragGhost.style.opacity = '0.85';
  dragGhost.style.pointerEvents = 'none';
  dragGhost.style.transform = 'scale(1.05)';
  dragGhost.textContent = cmdLabel(cmdType);
  document.body.appendChild(dragGhost);
  positionGhost(touch.clientX, touch.clientY);

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, {passive: false});
  document.addEventListener('touchend', onDragEnd);

  document.getElementById('program-list').classList.add('drag-over');
}

function positionGhost(x, y) {
  if (dragGhost) {
    dragGhost.style.left = (x - 40) + 'px';
    dragGhost.style.top = (y - 20) + 'px';
  }
}

function onDragMove(e) {
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  positionGhost(touch.clientX, touch.clientY);
}

function onDragEnd(e) {
  const touch = e.changedTouches ? e.changedTouches[0] : e;
  const progList = document.getElementById('program-list');
  progList.classList.remove('drag-over');

  // Check if dropped on program list
  const rect = progList.getBoundingClientRect();
  const x = touch.clientX, y = touch.clientY;
  if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
    addCommand(dragData.type);
    sfxPlace();
  }

  // Cleanup
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }
  dragData = null;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);
}

// ---- PROGRAM MANAGEMENT ----
function addCommand(type) {
  if (state.isRunning) return;
  if (type === 'loop-start') {
    state.program.push({type: 'loop-start', count: 2});
    state.program.push({type: 'loop-end'});
  } else {
    state.program.push({type: type});
  }
  renderProgram();
}

function removeCommand(index) {
  if (state.isRunning) return;
  const cmd = state.program[index];
  if (cmd.type === 'loop-start') {
    // Find matching loop-end
    let depth = 0;
    for (let i = index; i < state.program.length; i++) {
      if (state.program[i].type === 'loop-start') depth++;
      if (state.program[i].type === 'loop-end') {
        depth--;
        if (depth === 0) {
          state.program.splice(index, i - index + 1);
          break;
        }
      }
    }
  } else if (cmd.type === 'loop-end') {
    // Find matching loop-start
    let depth = 0;
    for (let i = index; i >= 0; i--) {
      if (state.program[i].type === 'loop-end') depth++;
      if (state.program[i].type === 'loop-start') {
        depth--;
        if (depth === 0) {
          state.program.splice(i, index - i + 1);
          break;
        }
      }
    }
  } else {
    state.program.splice(index, 1);
  }
  renderProgram();
}

function adjustLoopCount(index, delta) {
  if (state.isRunning) return;
  const cmd = state.program[index];
  if (cmd.type === 'loop-start') {
    cmd.count = Math.max(1, Math.min(9, cmd.count + delta));
    renderProgram();
  }
}

function renderProgram() {
  const list = document.getElementById('program-list');
  list.innerHTML = '';
  document.querySelector('.program-area .section-label').textContent = T('yourProgram');

  if (state.program.length === 0) {
    list.innerHTML = `<div class="placeholder">${T('dragHere')}</div>`;
    return;
  }

  let inLoop = false;
  state.program.forEach((cmd, i) => {
    const block = document.createElement('div');
    block.dataset.progIndex = i;

    if (cmd.type === 'loop-start') {
      block.className = 'cmd-block loop-start';
      block.innerHTML = `
        🔁 ${T('loop')}
        <button class="loop-adj" onclick="event.stopPropagation();adjustLoopCount(${i},-1)">−</button>
        <span class="loop-count">${cmd.count}</span>
        <button class="loop-adj" onclick="event.stopPropagation();adjustLoopCount(${i},+1)">+</button>
        <button class="remove-btn" onclick="event.stopPropagation();removeCommand(${i})">✕</button>
      `;
      inLoop = true;
    } else if (cmd.type === 'loop-end') {
      block.className = 'cmd-block loop-end';
      block.innerHTML = `${T('endLoop')} <button class="remove-btn" onclick="event.stopPropagation();removeCommand(${i})">✕</button>`;
      inLoop = false;
    } else {
      block.className = `cmd-block ${cmd.type}` + (inLoop ? ' in-loop' : '');
      block.innerHTML = `${cmdLabel(cmd.type)} <button class="remove-btn" onclick="event.stopPropagation();removeCommand(${i})">✕</button>`;
    }

    list.appendChild(block);
  });

  const progList = document.getElementById('program-list');
  progList.ondragover = (e) => e.preventDefault();
}

// ---- FLATTEN PROGRAM (expand loops) ----
function flattenProgram(program) {
  const result = [];
  let i = 0;
  while (i < program.length) {
    const cmd = program[i];
    if (cmd.type === 'loop-start') {
      // Collect commands until loop-end
      const loopCount = cmd.count;
      const innerCmds = [];
      let depth = 1;
      i++;
      while (i < program.length && depth > 0) {
        if (program[i].type === 'loop-start') depth++;
        if (program[i].type === 'loop-end') depth--;
        if (depth > 0) innerCmds.push(program[i]);
        i++;
      }
      // Expand the loop
      for (let rep = 0; rep < loopCount; rep++) {
        result.push(...flattenProgram(innerCmds));
      }
    } else if (cmd.type !== 'loop-end') {
      result.push(cmd);
      i++;
    } else {
      i++;
    }
  }
  return result;
}

// ---- RUN PROGRAM ----
async function runProgram() {
  if (state.isRunning) return;
  if (state.program.length === 0) return;

  state.isRunning = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('reset-btn').disabled = true;

  // Reset grid visuals
  renderGrid();

  const level = LEVELS[state.currentLevel];
  const flat = flattenProgram(state.program);
  let pos = {...state.playerPos};
  let dir = state.playerDir;
  let success = false;
  let hitWall = false;
  let moveCount = 0;
  let goalR = -1, goalC = -1;

  // Find goal
  for (let r = 0; r < level.grid.length; r++) {
    for (let c = 0; c < level.grid[0].length; c++) {
      if (level.grid[r][c] === 'G') { goalR = r; goalC = c; }
    }
  }

  // Highlight commands as they execute
  for (let step = 0; step < flat.length; step++) {
    const cmd = flat[step];

    // Find the program block to highlight
    highlightStep(step, flat);

    if (cmd.type === 'move') {
      const nr = pos.r + DIR_DR[dir];
      const nc = pos.c + DIR_DC[dir];

      // Check bounds
      if (nr < 0 || nr >= level.grid.length || nc < 0 || nc >= level.grid[0].length) {
        hitWall = true;
        sfxFail();
        showHint(T('hitEdge'));
        break;
      }
      // Check wall
      if (level.grid[nr][nc] === '#') {
        hitWall = true;
        sfxFail();
        showHint(T('hitWall'));
        break;
      }

      markCellVisited(pos.r, pos.c);
      pos.r = nr; pos.c = nc;
      movePlayerToCell(pos.r, pos.c);
      sfxMove();
      moveCount++;

      if (pos.r === goalR && pos.c === goalC) {
        success = true;
        sfxCollect();
        await sleep(300);
        break;
      }
    } else if (cmd.type === 'turn-left') {
      dir = (dir + 3) % 4;
      state.playerDir = dir;
      rotatePlayer(dir);
      sfxTurn();
    } else if (cmd.type === 'turn-right') {
      dir = (dir + 1) % 4;
      state.playerDir = dir;
      rotatePlayer(dir);
      sfxTurn();
    }

    await sleep(400);
  }

  clearHighlights();

  if (success) {
    await sleep(300);
    // Calculate stars
    const cmdCount = state.program.filter(c => c.type !== 'loop-start' && c.type !== 'loop-end').length
                   + state.program.filter(c => c.type === 'loop-start').length;
    const optimal = level.optimalMoves;
    let stars = 1;
    if (cmdCount <= optimal + 1) stars = 3;
    else if (cmdCount <= optimal + 3) stars = 2;

    sfxWin();
    showWin(stars);

    // Update progress
    state.starsEarned[state.currentLevel] = Math.max(state.starsEarned[state.currentLevel], stars);
    state.levelProgress[state.currentLevel] = 2;
    if (state.currentLevel + 1 < LEVELS.length) {
      state.levelProgress[state.currentLevel + 1] = Math.max(state.levelProgress[state.currentLevel + 1], 1);
    }
    saveProgress();
  } else if (!hitWall) {
    sfxFail();
    showHint(T('notReached'));
  }

  state.isRunning = false;
  document.getElementById('run-btn').disabled = false;
  document.getElementById('reset-btn').disabled = false;
}

function highlightStep(flatIndex, flatList) {
  // Simple: highlight all program blocks briefly
  clearHighlights();
  // Map flat index back to visual blocks approximately
  const blocks = document.querySelectorAll('#program-list .cmd-block');
  // We'll just pulse the whole program area
  blocks.forEach(b => b.style.opacity = '0.6');
  // Try to find the right block
  let flatCounter = -1;
  let inLoopBody = false;
  for (let i = 0; i < state.program.length; i++) {
    const cmd = state.program[i];
    if (cmd.type === 'loop-start' || cmd.type === 'loop-end') continue;
    flatCounter++;
    // This is simplified - just highlight approximately
  }
  // Highlight based on modular mapping
  const actionBlocks = Array.from(blocks).filter(b =>
    !b.classList.contains('loop-start') && !b.classList.contains('loop-end'));
  if (actionBlocks.length > 0) {
    const idx = flatIndex % actionBlocks.length;
    actionBlocks[idx].style.opacity = '1';
    actionBlocks[idx].classList.add('executing');
  }
}

function clearHighlights() {
  document.querySelectorAll('#program-list .cmd-block').forEach(b => {
    b.style.opacity = '1';
    b.classList.remove('executing');
  });
}

function showHint(text) {
  document.getElementById('hint-text').textContent = text;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ---- CONFETTI ----
function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bcb', '#845ec2'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    const shape = Math.random();
    if (shape < 0.33) piece.style.borderRadius = '50%';
    else if (shape < 0.66) piece.style.borderRadius = '0';
    else { piece.style.width = '8px'; piece.style.height = '16px'; piece.style.borderRadius = '2px'; }
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 4000);
}

// ---- TAP-TO-ADD (alternative to drag) ----
document.addEventListener('DOMContentLoaded', () => {
  // Also support tapping blocks to add them
  document.getElementById('command-palette').addEventListener('click', (e) => {
    if (state.isRunning) return;
    const block = e.target.closest('.cmd-block');
    if (block) {
      const type = block.dataset.cmdType;
      if (type) {
        addCommand(type);
        sfxPlace();
      }
    }
  });
});

// ---- BOOT ----
init();
</script>
